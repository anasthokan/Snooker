name: CD - Deploy to Production IIS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: Skip frontend npm build (use existing dist)
        required: false
        default: false
        type: boolean
      skip_iis_reset:
        description: Skip iisreset after deploy
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FRONTEND_PATH: C:\inetpub\wwwroot\GameHub
  BACKEND_PATH: C:\Projects\game-hub-backend-main\game-hub-backend-main
  API_URL: https://snooker-apis.atozeesolutions.com
  FRONTEND_URL: https://snooker.atozeesolutions.com

jobs:
  deploy:
    name: Deploy frontend + backend
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deploy paths
        shell: pwsh
        run: |
          Write-Host "Frontend deploy: $env:FRONTEND_PATH"
          Write-Host "Backend deploy:  $env:BACKEND_PATH"
          foreach ($tool in @('npm', 'python', 'git')) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              throw "$tool is not installed on this runner."
            }
          }

      - name: Deploy to IIS
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE "scripts\deploy-server-iis.ps1"
          if (-not (Test-Path $script)) { throw "Deploy script not found: $script" }

          $args = @{
            SourceRoot         = $env:GITHUB_WORKSPACE
            FrontendDeployPath = $env:FRONTEND_PATH
            BackendDeployPath  = $env:BACKEND_PATH
            ApiUrl             = $env:API_URL
          }
          if ('${{ inputs.skip_build }}' -eq 'true') { $args.SkipBuild = $true }
          if ('${{ inputs.skip_iis_reset }}' -eq 'true') { $args.SkipIisReset = $true }

          & $script @args

      - name: Health check
        shell: pwsh
        run: |
          Start-Sleep -Seconds 8
          $healthUrl = "$env:API_URL/health"
          Write-Host "Checking API: $healthUrl"
          $health = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 60
          Write-Host $health.Content
          if ($health.Content -notmatch 'ok') { throw "API health check failed" }

          Write-Host "Checking frontend: $env:FRONTEND_URL"
          $fe = Invoke-WebRequest -Uri $env:FRONTEND_URL -UseBasicParsing -TimeoutSec 60
          if ($fe.StatusCode -lt 200 -or $fe.StatusCode -ge 400) {
            throw "Frontend returned HTTP $($fe.StatusCode)"
          }
          Write-Host "Deploy OK"
